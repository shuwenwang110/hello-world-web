<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Animation</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: black;
        height: 100vh;
        overflow: hidden; /* ❗禁止滚动 */
        display: flex;
        justify-content: center;
        align-items: center;
    }

    img {
        height: 100vh;   /* ❗关键：撑满高度 */
        width: auto;     /* 保持比例 */
        object-fit: contain;
    }
</style>
</head>

<body>

<img src="animation.gif" alt="animation">

</body>
</html>
